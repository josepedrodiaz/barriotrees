<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#6B4FBF">
<title>Árboles Gigantes — Demo</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root {
    --paper: #F4F1EA; --card: #FFFFFF; --ink: #1E1B26; --muted: #6E697A; --hair: #E7E2D8;
    --violet: #6B4FBF; --violet-strong: #543399; --violet-soft: #EFEAFB;
    --good: #2E9E5B; --warn: #E0912F; --crit: #CC4433;
    --sed-bg: #FBEAE7; --ok-bg: #FBF3E2; --fel-bg: #E8F5EC;
    --shadow: 0 1px 2px rgba(30,27,38,.05), 0 8px 24px rgba(30,27,38,.07);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; background: var(--paper); color: var(--ink); font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif; line-height: 1.45; -webkit-text-size-adjust: 100%; overflow-x: hidden; }
  .app { max-width: 460px; margin: 0 auto; min-height: 100vh; }
  .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-variant-numeric: tabular-nums; }
  button { font: inherit; cursor: pointer; border: none; border-radius: 14px; }

  .top { position: sticky; top: 0; z-index: 20; background: rgba(244,241,234,.93); backdrop-filter: blur(10px); border-bottom: 1px solid var(--hair); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .brand { font-weight: 800; font-size: 16px; letter-spacing: -.02em; display: flex; align-items: center; gap: 7px; }
  .maqueta { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); border: 1px solid var(--hair); border-radius: 999px; padding: 3px 8px; }
  .reset { font-size: 12px; font-weight: 700; color: var(--muted); background: none; padding: 4px; }

  .view { padding: 16px; display: none; }
  .view.on { display: block; animation: fade .3s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .me { background: linear-gradient(135deg, var(--violet) 0%, #8A6BE0 100%); color: #fff; border-radius: 20px; padding: 16px 18px; box-shadow: var(--shadow); }
  .me .lvl { font-size: 12px; font-weight: 700; opacity: .9; text-transform: uppercase; letter-spacing: .06em; }
  .me .pts { font-size: 30px; font-weight: 800; letter-spacing: -.02em; margin: 2px 0 10px; }
  .me .pts small { font-size: 14px; font-weight: 600; opacity: .85; }
  .bar { height: 8px; background: rgba(255,255,255,.28); border-radius: 999px; overflow: hidden; }
  .bar > i { display: block; height: 100%; background: #fff; border-radius: 999px; transition: width .6s cubic-bezier(.2,.8,.2,1); }
  .me .next { font-size: 11.5px; opacity: .9; margin-top: 6px; }
  .badges { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
  .badge { display: inline-flex; align-items: center; gap: 5px; background: rgba(255,255,255,.18); border-radius: 999px; padding: 5px 10px; font-size: 12px; font-weight: 700; }

  /* stat + scan CTA */
  .stat { display: flex; gap: 10px; margin: 14px 0 12px; }
  .stat .box { flex: 1; background: var(--card); border: 1px solid var(--hair); border-radius: 16px; padding: 12px 14px; box-shadow: var(--shadow); }
  .stat .box .num { font-size: 26px; font-weight: 800; letter-spacing: -.02em; }
  .stat .box.sed .num { color: var(--crit); }
  .stat .box.fel .num { color: var(--good); }
  .stat .box .lab { font-size: 12px; color: var(--muted); font-weight: 600; }
  .scan-cta { width: 100%; padding: 17px; font-size: 17px; font-weight: 800; color: #fff; background: var(--violet); border-radius: 18px; box-shadow: 0 6px 18px rgba(107,79,191,.4); display: flex; align-items: center; justify-content: center; gap: 9px; }
  .scan-cta:active { background: var(--violet-strong); }
  .cta-note { text-align: center; font-size: 12px; color: var(--muted); margin: 8px 4px 0; }

  .section-h { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 22px 4px 10px; display: flex; align-items: center; gap: 8px; }
  .section-h .n { color: var(--crit); }

  .trow { display: flex; align-items: center; gap: 12px; background: var(--card); border: 1px solid var(--hair); border-radius: 16px; padding: 11px 13px; margin-bottom: 9px; box-shadow: var(--shadow); cursor: pointer; transition: transform .1s; }
  .trow:active { transform: scale(.985); }
  .trow .mini { width: 46px; height: 46px; flex: none; }
  .trow .info { flex: 1; min-width: 0; }
  .trow .nm { font-weight: 800; font-size: 15px; }
  .trow .st { font-size: 12.5px; margin-top: 1px; }
  .chip { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 800; padding: 3px 9px; border-radius: 999px; }
  .chip.sed { color: var(--crit); background: var(--sed-bg); }
  .chip.ok { color: #a9701a; background: var(--ok-bg); }
  .chip.fel { color: var(--good); background: var(--fel-bg); }
  .trow .go { color: var(--muted); font-size: 20px; flex: none; }

  .back { background: none; color: var(--muted); font-weight: 700; font-size: 14px; padding: 4px 0; margin-bottom: 6px; }
  .hero { text-align: center; padding: 8px 0 4px; }
  .hero .big { width: 190px; height: 190px; margin: 0 auto; }
  .hero h2 { font-size: 24px; font-weight: 800; letter-spacing: -.02em; margin: 6px 0 2px; }
  .hero .sci { font-size: 13px; color: var(--muted); font-style: italic; }
  .statline { text-align: center; margin: 12px 0; }
  .statline .days { font-size: 13.5px; color: var(--muted); margin-top: 8px; }
  .card2 { background: var(--card); border: 1px solid var(--hair); border-radius: 16px; padding: 14px 16px; margin: 14px 0; box-shadow: var(--shadow); }
  .card2 .row { display: flex; justify-content: space-between; align-items: center; font-size: 13.5px; padding: 5px 0; }
  .card2 .row + .row { border-top: 1px solid var(--hair); }
  .card2 .k { color: var(--muted); } .card2 .v { font-weight: 700; }
  .checks { display: flex; flex-direction: column; gap: 6px; background: var(--fel-bg); border: 1px solid #CDE9D6; border-radius: 14px; padding: 12px 14px; margin: 12px 0; }
  .checks div { font-size: 13.5px; font-weight: 700; color: var(--good); display: flex; align-items: center; gap: 8px; }
  .checks.fail { background: var(--sed-bg); border-color: #F0C9C2; }
  .checks .bad { color: var(--crit); }
  .water { width: 100%; padding: 17px; font-size: 17px; font-weight: 800; color: #fff; background: var(--violet); border-radius: 18px; box-shadow: 0 6px 18px rgba(107,79,191,.4); display: flex; align-items: center; justify-content: center; gap: 9px; }
  .water:active { background: var(--violet-strong); }
  .water.done { background: var(--good); box-shadow: none; }
  .water.locked { background: #E7E2D8; color: var(--muted); box-shadow: none; }
  .lockmsg { text-align: center; font-size: 12.5px; color: var(--muted); margin: 8px 4px 0; }

  /* scan view */
  #scan { padding: 0; }
  .cam { position: relative; height: 78vh; min-height: 420px; background: radial-gradient(circle at 50% 42%, #2a2733, #14121b); overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .frame { width: 220px; height: 220px; border-radius: 26px; position: relative; }
  .frame::before, .frame::after, .frame > i::before, .frame > i::after { content: ""; position: absolute; width: 40px; height: 40px; border: 4px solid #fff; }
  .frame::before { top: 0; left: 0; border-right: none; border-bottom: none; border-radius: 16px 0 0 0; }
  .frame::after { top: 0; right: 0; border-left: none; border-bottom: none; border-radius: 0 16px 0 0; }
  .frame > i::before { bottom: 0; left: 0; border-right: none; border-top: none; border-radius: 0 0 0 16px; }
  .frame > i::after { bottom: 0; right: 0; border-left: none; border-top: none; border-radius: 0 0 16px 0; }
  .laser { position: absolute; left: 8px; right: 8px; height: 3px; background: #6B4FBF; box-shadow: 0 0 12px 2px #6B4FBF; border-radius: 2px; animation: scan 1.6s ease-in-out infinite; }
  @keyframes scan { 0%,100% { top: 10px; } 50% { top: 205px; } }
  .qrghost { position: absolute; inset: 40px; opacity: .18; background: repeating-conic-gradient(#fff 0 25%, transparent 0 50%) 0 0/22px 22px; border-radius: 6px; }
  .camtext { position: absolute; bottom: 40px; left: 0; right: 0; text-align: center; color: #fff; font-weight: 700; font-size: 15px; }
  .camtext small { display: block; opacity: .7; font-weight: 500; font-size: 12.5px; margin-top: 4px; }
  .camx { position: absolute; top: 16px; left: 16px; color: #fff; background: rgba(255,255,255,.15); border-radius: 999px; padding: 8px 14px; font-weight: 700; font-size: 13px; }
  .camskip { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); color: #fff; background: rgba(255,255,255,.16); border-radius: 999px; padding: 10px 18px; font-weight: 700; font-size: 13px; }
  #reader { width: 100%; max-width: 340px; border-radius: 16px; overflow: hidden; }
  #reader video { border-radius: 16px; }

  .scrim { position: fixed; inset: 0; background: rgba(30,27,38,.55); display: none; align-items: center; justify-content: center; padding: 24px; z-index: 60; }
  .scrim.on { display: flex; animation: fade .25s ease; }
  .modal { background: var(--card); border-radius: 24px; padding: 26px 22px; max-width: 360px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.3); animation: pop .4s cubic-bezier(.2,1.3,.4,1); }
  @keyframes pop { from { transform: scale(.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal .medal { font-size: 60px; line-height: 1; }
  .modal h3 { font-size: 13px; text-transform: uppercase; letter-spacing: .08em; color: var(--violet-strong); margin: 12px 0 4px; font-weight: 800; }
  .modal .name { font-size: 24px; font-weight: 800; letter-spacing: -.02em; margin: 0 0 10px; }
  .modal p { font-size: 15px; color: var(--ink); margin: 0 0 8px; line-height: 1.5; }
  .modal .pin { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; font-weight: 800; color: var(--violet-strong); background: var(--violet-soft); border: 1px solid #DCD2F4; padding: 7px 12px; border-radius: 999px; margin: 8px 0 16px; }
  .modal .close { width: 100%; padding: 14px; font-weight: 800; color: #fff; background: var(--violet); border-radius: 14px; }

  .wtr { position: fixed; inset: 0; background: linear-gradient(160deg, #6B4FBF, #8A6BE0); color: #fff; display: none; align-items: center; justify-content: center; padding: 30px; z-index: 80; }
  .wtr.on { display: flex; animation: fade .25s ease; }
  .wtr-box { text-align: center; max-width: 340px; width: 100%; }
  .wtr-emoji { font-size: 56px; animation: sway 1.2s ease-in-out infinite; }
  @keyframes sway { 0%,100% { transform: rotate(-9deg); } 50% { transform: rotate(9deg); } }
  .wtr-title { font-size: 22px; font-weight: 800; margin: 12px 0 16px; }
  .wtr-bar { height: 10px; background: rgba(255,255,255,.28); border-radius: 999px; overflow: hidden; }
  .wtr-bar > i { display: block; height: 100%; width: 0; background: #fff; border-radius: 999px; }
  .wtr-tip { font-size: 15px; margin: 18px 0 10px; min-height: 46px; line-height: 1.5; font-weight: 600; }
  .wtr-note { font-size: 12px; opacity: .82; }
  .petal { position: fixed; top: 40%; width: 12px; height: 12px; background: var(--violet); border-radius: 50% 50% 50% 0; pointer-events: none; z-index: 55; opacity: .9; }
  .toast { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(20px); background: var(--ink); color: #fff; padding: 12px 18px; border-radius: 999px; font-size: 13.5px; font-weight: 700; opacity: 0; transition: all .25s; pointer-events: none; z-index: 70; box-shadow: 0 8px 24px rgba(0,0,0,.3); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .foot { text-align: center; font-size: 11px; color: var(--muted); padding: 20px; }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <span class="brand">🌳 Árboles Gigantes</span>
    <span class="maqueta">Maqueta</span>
    <button class="reset" id="reset">↺ Reiniciar</button>
  </div>
  <div class="view on" id="home"></div>
  <div class="view" id="detail"></div>
  <div class="view" id="scan"></div>
  <div class="foot">Demo — Plaza Gigante del Oeste · datos de ejemplo</div>
</div>

<div class="wtr" id="wtr"><div class="wtr-box">
  <div class="wtr-emoji">🪣💧</div>
  <div class="wtr-title">Regando…</div>
  <div class="wtr-bar"><i id="wtrBar"></i></div>
  <div class="wtr-tip" id="wtrTip"></div>
  <div class="wtr-note">Dejá correr el agua — el riego se registra al terminar</div>
</div></div>
<div class="scrim" id="scrim"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
(function () {
  "use strict";
  var $ = function (s, r) { return (r || document).querySelector(s); };

  var LEVELS = [ { n: "Aprendiz", min: 0 }, { n: "Cuidador", min: 50 }, { n: "Gran Cuidador", min: 150 }, { n: "Alma de la Plaza", min: 300 } ];
  function levelFor(p) { var l = LEVELS[0]; for (var i = 0; i < LEVELS.length; i++) if (p >= LEVELS[i].min) l = LEVELS[i]; return l; }
  function nextLevel(p) { for (var i = 0; i < LEVELS.length; i++) if (p < LEVELS[i].min) return LEVELS[i]; return null; }

  var SEED = [ { id: 1, days: 5 }, { id: 2, days: 4 }, { id: 3, days: 6 }, { id: 4, days: 1 }, { id: 5, days: 3 }, { id: 6, days: 2 }, { id: 7, days: 5 }, { id: 8, days: 0 }, { id: 9, days: 3 }, { id: 10, days: 2 },
    { id: 99, days: 4, far: true } /* ÁRBOL DE PRUEBA GPS (lejos) — borrar esta línea después del sábado */ ];
  var state, trees, wateredToday, welcomed;
  function reset() { state = { pts: 0, watered: 0, rescates: 0, badges: [] }; wateredToday = 0; welcomed = false; trees = SEED.map(function (t) { return { id: t.id, days: t.days, far: t.far }; }); show("home"); renderHome(); }

  function nameOf(t) { return t.far ? "🧪 Prueba GPS (lejos)" : "Jacarandá #" + t.id; }
  function stateOf(days) {
    if (days <= 1) return { label: "Feliz", cls: "fel", health: 1, urg: 0 };
    if (days <= 2) return { label: "Bien", cls: "ok", health: .68, urg: 1 };
    if (days <= 4) return { label: "Sediento", cls: "sed", health: .42, urg: 2 };
    return { label: "¡Muy sediento!", cls: "sed", health: .16, urg: 3 };
  }
  function lerp(a, b, t) { return Math.round(a + (b - a) * t); }
  function leafColor(h) { return "rgb(" + lerp(150, 46, h) + "," + lerp(120, 139, h) + "," + lerp(70, 87, h) + ")"; }
  function treeSVG(h, size) {
    var col = leafColor(h), r = 26 + 8 * h, cy = 40 - 3 * h, blooms = "";
    if (h > 0.85) { [[36, 30], [64, 32], [50, 22], [42, 44], [60, 46]].forEach(function (p) { blooms += '<circle cx="' + p[0] + '" cy="' + p[1] + '" r="3.4" fill="#6B4FBF" opacity=".9"/>'; }); }
    var droop = h < 0.35 ? '<path d="M50 58 q-10 8 -16 4" stroke="' + col + '" stroke-width="3" fill="none" opacity=".6"/>' : "";
    return '<svg viewBox="0 0 100 100" width="' + size + '" height="' + size + '" xmlns="http://www.w3.org/2000/svg">' +
      '<ellipse cx="50" cy="92" rx="26" ry="5" fill="#000" opacity=".07"/>' +
      '<rect x="46.5" y="' + (cy + r - 6) + '" width="7" height="' + (92 - (cy + r - 6)) + '" rx="3" fill="#8a6a4a"/>' +
      '<circle cx="' + (50 - r * .45) + '" cy="' + (cy + 6) + '" r="' + (r * .72) + '" fill="' + col + '"/>' +
      '<circle cx="' + (50 + r * .45) + '" cy="' + (cy + 6) + '" r="' + (r * .72) + '" fill="' + col + '"/>' +
      '<circle cx="50" cy="' + cy + '" r="' + r + '" fill="' + col + '"/>' + droop + blooms + '</svg>';
  }

  function renderHome() {
    var lv = levelFor(state.pts), nx = nextLevel(state.pts);
    var pct = nx ? Math.round((state.pts - lv.min) / (nx.min - lv.min) * 100) : 100;
    var badges = state.badges.length ? state.badges.map(function (b) { return '<span class="badge">📌 ' + b.icon + ' ' + b.name + '</span>'; }).join("") : '<span class="badge" style="opacity:.75">Sin logros todavía — escaneá tu primer árbol</span>';
    var me = '<div class="me"><div class="lvl">Cuidador · ' + lv.n + '</div><div class="pts">' + state.pts + ' <small>puntos</small></div>' +
      '<div class="bar"><i style="width:' + pct + '%"></i></div>' +
      (nx ? '<div class="next">Te faltan ' + (nx.min - state.pts) + ' para <b>' + nx.n + '</b></div>' : '<div class="next">Nivel máximo 🌟</div>') +
      '<div class="badges">' + badges + '</div></div>';

    var sorted = trees.slice().sort(function (a, b) { return stateOf(b.days).urg - stateOf(a.days).urg || a.id - b.id; });
    var thirsty = sorted.filter(function (t) { return stateOf(t.days).urg >= 2; });
    var rest = sorted.filter(function (t) { return stateOf(t.days).urg < 2; });

    var stat = '<div class="stat"><div class="box sed"><div class="num">' + thirsty.length + '</div><div class="lab">con sed ahora</div></div>' +
      '<div class="box fel"><div class="num">' + wateredToday + '</div><div class="lab">regados hoy</div></div></div>' +
      '<button class="scan-cta" id="scanBtn">📷 Escanear QR de un árbol</button>' +
      '<div class="cta-note">Para sumar hay que estar en el árbol y escanear su QR. Tocar la lista solo muestra info.</div>';

    function row(t) {
      var s = stateOf(t.days);
      return '<div class="trow" data-id="' + t.id + '"><div class="mini">' + treeSVG(s.health, 46) + '</div>' +
        '<div class="info"><div class="nm">' + nameOf(t) + '</div>' +
        '<div class="st"><span class="chip ' + s.cls + '">' + s.label + '</span> <span style="color:var(--muted);font-size:12px"> · hace ' + t.days + ' día' + (t.days === 1 ? "" : "s") + '</span></div></div><span class="go">›</span></div>';
    }
    $("#home").innerHTML = me + stat +
      '<div class="section-h">💧 Necesitan agua ahora <span class="n">(' + thirsty.length + ')</span></div>' +
      (thirsty.length ? thirsty.map(row).join("") : '<div style="color:var(--muted);font-size:14px;padding:6px 4px">Ninguno urgente 🎉</div>') +
      (rest.length ? '<div class="section-h">Ya están bien</div>' + rest.map(row).join("") : "");
    $("#scanBtn").addEventListener("click", function () { scanFlow(null); });
    Array.prototype.forEach.call(document.querySelectorAll(".trow"), function (el) { el.addEventListener("click", function () { openTree(+el.getAttribute("data-id"), false); }); });
  }

  function mostUrgentUnwatered() {
    var s = trees.slice().filter(function (t) { return t.days > 1; }).sort(function (a, b) { return stateOf(b.days).urg - stateOf(a.days).urg || a.id - b.id; });
    return (s[0] || trees[0]).id;
  }

  // ---- ESCANEO (acción central) ----
  var qrScanner = null;
  function stopScanner(cb) {
    if (qrScanner) { var s = qrScanner; qrScanner = null; s.stop().then(function () { try { s.clear(); } catch (e) {} if (cb) cb(); }).catch(function () { if (cb) cb(); }); }
    else if (cb) cb();
  }
  function extractId(text) {
    try { var u = new URL(text); var t = parseInt(u.searchParams.get("t"), 10); if (isFinite(t)) return t; } catch (e) {}
    var n = parseInt(text, 10); return isFinite(n) ? n : null;
  }
  function scanFlow(targetId) {
    var fallbackId = targetId || mostUrgentUnwatered();
    $("#scan").innerHTML =
      '<div class="cam"><button class="camx" id="camx">✕ Cancelar</button>' +
      '<div id="reader"></div>' +
      '<button class="camskip" id="camskip">No tengo QR — simular</button>' +
      '<div class="camtext">Apuntá al QR de la chapita<small>La app lee el QR y confirma que estás cerca</small></div></div>';
    show("scan");
    $("#camx").addEventListener("click", function () { stopScanner(function () { show("home"); renderHome(); }); });
    $("#camskip").addEventListener("click", function () { stopScanner(function () { openTree(fallbackId, true); }); });
    if (typeof Html5Qrcode === "undefined") { toast("No cargó el lector — usá Simular"); return; }
    qrScanner = new Html5Qrcode("reader", { verbose: false });
    qrScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 220, height: 220 } },
      function (text) {
        var id = extractId(text);
        stopScanner(function () {
          if (id && trees.some(function (x) { return x.id === id; })) openTree(id, true);
          else { toast("QR no reconocido"); show("home"); renderHome(); }
        });
      }, function () {}
    ).catch(function () { toast("No pude abrir la cámara — tocá Simular"); });
  }

  var curId = null;
  function openTree(id, scanned) { curId = id; renderDetail(scanned); show("detail"); window.scrollTo(0, 0); }
  function renderDetail(scanned) {
    var t = trees.filter(function (x) { return x.id === curId; })[0], s = stateOf(t.days);
    var bonus = s.urg >= 3 ? 25 : s.urg === 2 ? 15 : s.urg === 1 ? 5 : 0;
    var action;
    if (scanned && t.far) action = '<div class="checks fail"><div class="ok">✓ QR válido</div><div class="bad">✗ Estás lejos del árbol (~3,2 km)</div></div><button class="water locked" disabled>No podés regar de lejos</button><div class="lockmsg">El riego solo cuenta si estás <b>en el árbol</b>. Acercate y volvé a escanear.</div>';
    else if (s.urg === 0 && scanned) action = '<div class="checks"><div>✓ QR válido · Jacarandá #' + t.id + '</div><div>✓ Estás a 4 m del árbol</div></div><button class="water locked" disabled>Este ya está feliz 🌳</button><div class="lockmsg">Da 0 puntos: mejor buscá uno sediento 👉</div>';
    else if (scanned) action = '<div class="checks"><div>✓ QR válido · Jacarandá #' + t.id + '</div><div>✓ Estás a 4 m del árbol</div></div><button class="water" id="water">💧 Confirmar riego (+' + (10 + bonus) + ')</button>';
    else action = '<button class="water locked" id="scanHere">📷 Escaneá el QR para regar</button><div class="lockmsg">No se puede regar desde acá. Andá al árbol y escaneá su chapita.</div>';

    $("#detail").innerHTML = '<button class="back" id="back">‹ Volver</button>' +
      '<div class="hero"><div class="big" id="bigtree">' + treeSVG(s.health, 190) + '</div><h2>' + nameOf(t) + '</h2><div class="sci">Jacaranda mimosifolia</div></div>' +
      '<div class="statline"><span class="chip ' + s.cls + '" style="font-size:13px;padding:5px 12px">' + s.label + '</span>' +
      '<div class="days" id="days">Último riego: hace ' + t.days + ' día' + (t.days === 1 ? "" : "s") + '</div></div>' +
      '<div class="card2"><div class="row"><span class="k">Leyenda de este árbol</span><span class="v" style="color:var(--muted)">— próximamente 🚩</span></div>' +
      '<div class="row"><span class="k">Sector</span><span class="v">Galería central</span></div></div>' + action;
    $("#back").addEventListener("click", function () { show("home"); renderHome(); });
    if ($("#water")) $("#water").addEventListener("click", startWatering);
    if ($("#scanHere")) $("#scanHere").addEventListener("click", function () { scanFlow(t.id); });
  }

  var TIPS = [
    "Los jacarandás jóvenes toman agua cada ~2 días en verano.",
    "Regá despacio y en la base: así el agua llega a la raíz, no se escurre.",
    "Con un balde alcanza. De más no ayuda a un arbolito joven.",
    "En primavera florece violeta — por eso La Plata es la ciudad de los jacarandás.",
    "Mejor a la mañana temprano o al atardecer, no al sol del mediodía."
  ];
  function startWatering() {
    var DUR = 5000, bar = $("#wtrBar"), tip = $("#wtrTip");
    var i = Math.floor(Math.random() * TIPS.length);
    tip.textContent = TIPS[i];
    $("#wtr").className = "wtr on";
    bar.style.transition = "none"; bar.style.width = "0%";
    var iv = setInterval(function () { i = (i + 1) % TIPS.length; tip.textContent = TIPS[i]; }, 1700);
    setTimeout(function () { bar.style.transition = "width " + DUR + "ms linear"; bar.style.width = "100%"; }, 40);
    setTimeout(function () { clearInterval(iv); $("#wtr").className = "wtr"; applyWater(); }, DUR + 80);
  }
  function applyWater() {
    var t = trees.filter(function (x) { return x.id === curId; })[0], s = stateOf(t.days);
    var bonus = s.urg >= 3 ? 25 : s.urg === 2 ? 15 : 5, gained = 10 + bonus;
    var wasFirst = state.watered === 0, wasRescate = s.urg >= 3;
    state.watered++; wateredToday++; if (wasRescate) state.rescates++;
    var before = state.pts; state.pts += gained; t.days = 0;

    petals();
    var btn = $("#water"); btn.className = "water done"; btn.textContent = "✓ Regado · +" + gained + " pts"; btn.disabled = true;
    $("#bigtree").innerHTML = treeSVG(1, 190); $("#days").textContent = "Recién regado · ¡gracias!";
    toast("+" + gained + " puntos" + (wasRescate ? " · ¡Rescate! 💪" : ""));

    var lvBefore = levelFor(before).n, lvAfter = levelFor(state.pts).n;
    setTimeout(function () {
      if (wasFirst && !hasBadge("Primer riego")) { state.badges.push({ icon: "💧", name: "Primer riego" }); modal("💧", "Nuevo logro", "Primer riego", "Regaste tu primer árbol. Chiquito el gesto, enorme para ese jacarandá. Bienvenido, Cuidador.", true); }
      else if (lvAfter !== lvBefore) modal("⭐", "Subiste de nivel", lvAfter, levelCopy(lvAfter), false);
      else if (wasRescate) modal("🚑", "Nuevo logro en camino", "Rescatista " + state.rescates + "/5", "Regaste un árbol al borde de secarse. Cinco rescates y te ganás el pin de Rescatista.", false);
    }, 750);
  }
  function hasBadge(n) { return state.badges.some(function (b) { return b.name === n; }); }
  function levelCopy(n) { return n === "Cuidador" ? "Ya no sos visita. Sos Cuidador de la plaza." : n === "Gran Cuidador" ? "La plaza empieza a ser tuya. Gran Cuidador." : n === "Alma de la Plaza" ? "Sos parte del lugar. Alma de la Plaza." : "¡Seguí así!"; }

  function welcomeModal() {
    $("#modal").innerHTML = '<div class="medal">🌳</div><h3>Bienvenido a Árboles Gigantes</h3><div class="name">Escaneaste un árbol de verdad</div>' +
      '<p>Es un jacarandá jovencito de la plaza y <b>tiene sed</b>. Llenás el balde en el bebedero, lo regás, y acá lo ves reverdecer y sumás puntos. Así, entre vecinos, hacemos crecer la plaza.</p>' +
      '<button class="close" id="wclose">Conocer mi árbol 🌱</button>';
    $("#scrim").className = "scrim on";
    $("#wclose").addEventListener("click", function () { $("#scrim").className = "scrim"; });
  }
  function modal(medal, kicker, name, copy, isPin) {
    $("#modal").innerHTML = '<div class="medal">' + medal + '</div><h3>' + kicker + '</h3><div class="name">' + name + '</div><p>' + copy + '</p>' + (isPin ? '<div class="pin">📌 Este logro se entrega como pin real</div>' : "") + '<button class="close" id="mclose">Genial</button>';
    $("#scrim").className = "scrim on";
    $("#mclose").addEventListener("click", function () { $("#scrim").className = "scrim"; });
  }
  function petals() { for (var i = 0; i < 10; i++) { var p = document.createElement("div"); p.className = "petal"; p.style.left = (30 + Math.random() * 40) + "%"; p.style.top = "38%"; document.body.appendChild(p); var dx = (Math.random() * 2 - 1) * 120, dy = 120 + Math.random() * 120, rot = Math.random() * 360; p.animate([{ transform: "translate(0,0) rotate(0)", opacity: .95 }, { transform: "translate(" + dx + "px," + dy + "px) rotate(" + rot + "deg)", opacity: 0 }], { duration: 900 + Math.random() * 500, easing: "cubic-bezier(.3,.7,.4,1)" }); (function (el) { setTimeout(function () { el.remove(); }, 1500); })(p); } }
  var tt; function toast(m) { var t = $("#toast"); t.textContent = m; t.className = "toast show"; clearTimeout(tt); tt = setTimeout(function () { t.className = "toast"; }, 1900); }
  function show(v) { Array.prototype.forEach.call(document.querySelectorAll(".view"), function (el) { el.className = "view" + (el.id === v ? " on" : ""); }); }

  $("#reset").addEventListener("click", reset);
  reset();
  var tp = parseInt(new URLSearchParams(location.search).get("t"), 10);
  if (isFinite(tp) && trees.some(function (x) { return x.id === tp; })) { openTree(tp, true); if (!welcomed) { welcomed = true; welcomeModal(); } }
})();
</script>
</body>
</html>
