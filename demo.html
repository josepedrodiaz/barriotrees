<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#241F33">
<title>Árboles Gigantes — Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root {
    --sky1: #7FC5E8; --sky2: #A9E0F2; --grass: #6BBE4A;
    --panel: #2B2542; --panel2: #221C36; --edge-d: #14101F; --edge-l: #4A3F6E;
    --ink: #F3EEFF; --dim: #B9AEE0;
    --violet: #7C5CD0; --violet-d: #5A3FA6; --violet-l: #A98CE8;
    --gold: #F5C542; --sed: #E5484D; --bien: #EBA53B; --feliz: #46C36A; --water: #3FA9F5;
    --pixel: 'Press Start 2P', monospace; --read: 'VT323', 'Courier New', monospace;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; font-family: var(--read); font-size: 20px; color: var(--ink);
    background: linear-gradient(180deg, var(--sky1) 0%, var(--sky2) 46%, #C7ECC0 46.2%, #A9DE9E 100%);
    background-attachment: fixed; min-height: 100vh; line-height: 1.2; }
  .app { max-width: 460px; margin: 0 auto; min-height: 100vh; padding-bottom: 90px; }
  .px { font-family: var(--pixel); }
  button { font: inherit; cursor: pointer; border: none; }
  svg { image-rendering: pixelated; }

  /* panels + buttons: pixel bevel */
  .panel { background: var(--panel); border: 3px solid var(--edge-d);
    box-shadow: inset 3px 3px 0 var(--edge-l), inset -3px -3px 0 #1a1528, 0 4px 0 rgba(0,0,0,.25); }
  .btn { font-family: var(--pixel); font-size: 11px; color: #fff; background: var(--violet);
    border: 3px solid var(--edge-d); padding: 13px 12px; display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: inset 3px 3px 0 var(--violet-l), inset -3px -3px 0 var(--violet-d), 0 5px 0 #2c1f52; }
  .btn:active { transform: translateY(3px); box-shadow: inset 3px 3px 0 var(--violet-l), inset -3px -3px 0 var(--violet-d), 0 2px 0 #2c1f52; }
  .btn.wide { width: 100%; }
  .btn.ghost { background: #4B4270; box-shadow: inset 3px 3px 0 #6a5f96, inset -3px -3px 0 #322a4f, 0 5px 0 #201a33; }
  .btn.ghost:active { transform: translateY(3px); box-shadow: inset 3px 3px 0 #6a5f96, inset -3px -3px 0 #322a4f, 0 2px 0 #201a33; }
  .btn.gold { background: var(--gold); color: #3a2c00; box-shadow: inset 3px 3px 0 #ffe08a, inset -3px -3px 0 #c99a1e, 0 5px 0 #8a6a10; }
  .btn.green { background: var(--feliz); box-shadow: inset 3px 3px 0 #7ee29a, inset -3px -3px 0 #2b9350, 0 5px 0 #1c6437; }
  .btn.red { background: var(--sed); box-shadow: inset 3px 3px 0 #ff8a8d, inset -3px -3px 0 #a82c30, 0 5px 0 #7a2023; }
  .btn.sm { font-size: 9px; padding: 10px; box-shadow: inset 2px 2px 0 var(--violet-l), inset -2px -2px 0 var(--violet-d), 0 4px 0 #2c1f52; }
  .btn[disabled] { opacity: .55; }

  /* top HUD */
  .top { position: sticky; top: 0; z-index: 30; display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 10px 12px; background: var(--panel2); border-bottom: 4px solid var(--edge-d); }
  .logo { font-family: var(--pixel); font-size: 12px; color: var(--feliz); text-shadow: 2px 2px 0 #0d3d1f; display: flex; gap: 6px; align-items: center; }
  .logo b { color: var(--violet-l); text-shadow: 2px 2px 0 #2c1f52; }
  .tag { font-family: var(--pixel); font-size: 7px; color: var(--dim); border: 2px solid var(--edge-l); padding: 4px 6px; }
  .reset { font-family: var(--pixel); font-size: 8px; color: var(--dim); background: none; border: 2px solid var(--edge-l); padding: 6px 7px; }

  .view { padding: 14px; display: none; }
  .view.on { display: block; }

  /* player HUD */
  .me { padding: 14px; }
  .me .lvl { font-family: var(--pixel); font-size: 10px; color: var(--gold); text-shadow: 2px 2px 0 #6b4e08; }
  .me .pts { font-family: var(--pixel); font-size: 22px; margin: 10px 0; color: #fff; text-shadow: 3px 3px 0 #000; }
  .me .pts small { font-family: var(--read); font-size: 18px; color: var(--dim); }
  .xp { height: 18px; background: #171225; border: 3px solid var(--edge-d); padding: 2px; }
  .xp > i { display: block; height: 100%; width: 0; background: repeating-linear-gradient(90deg, var(--feliz) 0 8px, #3bb35f 8px 10px); transition: width .5s steps(8); }
  .me .next { font-size: 17px; color: var(--dim); margin-top: 7px; }
  .badges { display: flex; gap: 7px; margin-top: 12px; flex-wrap: wrap; }
  .badge { font-family: var(--pixel); font-size: 8px; color: #3a2c00; background: var(--gold); border: 2px solid #8a6a10; padding: 6px 8px; display: inline-flex; gap: 5px; align-items: center; box-shadow: inset 2px 2px 0 #ffe08a; }
  .badge.empty { background: #3a3355; color: var(--dim); border-color: var(--edge-l); box-shadow: none; }

  .stat { display: flex; gap: 10px; margin: 14px 0 12px; }
  .stat .box { flex: 1; padding: 12px; text-align: center; }
  .stat .num { font-family: var(--pixel); font-size: 22px; }
  .stat .num.sed { color: var(--sed); } .stat .num.fel { color: var(--feliz); }
  .stat .lab { font-size: 16px; color: var(--dim); margin-top: 6px; }
  .cta-note { text-align: center; font-size: 16px; color: #2c4a1e; margin: 9px 4px 0; }

  .section-h { font-family: var(--pixel); font-size: 10px; color: #234a12; margin: 20px 4px 10px; text-shadow: 1px 1px 0 rgba(255,255,255,.4); }
  .section-h .n { color: var(--sed); }

  .trow { display: flex; align-items: center; gap: 10px; padding: 8px 10px; margin-bottom: 8px; cursor: pointer; }
  .trow:active { transform: translateY(2px); }
  .trow .mini { width: 52px; height: 52px; flex: none; }
  .trow .info { flex: 1; min-width: 0; }
  .trow .nm { font-family: var(--pixel); font-size: 10px; color: #fff; }
  .trow .st { margin-top: 6px; }
  .chip { font-family: var(--pixel); font-size: 7px; padding: 4px 7px; border: 2px solid; display: inline-block; }
  .chip.sed { color: var(--sed); border-color: var(--sed); }
  .chip.ok { color: var(--bien); border-color: var(--bien); }
  .chip.fel { color: var(--feliz); border-color: var(--feliz); }
  .trow .days { font-size: 15px; color: var(--dim); margin-left: 6px; }
  .trow .go { font-family: var(--pixel); font-size: 12px; color: var(--violet-l); }
  .empty { text-align: center; color: #2c4a1e; padding: 16px; font-size: 17px; }

  /* detail */
  .back { font-family: var(--pixel); font-size: 9px; color: #234a12; background: none; border: none; padding: 6px 0; margin-bottom: 4px; }
  .hero { text-align: center; padding: 4px 0; }
  .hero .big { width: 190px; height: 190px; margin: 0 auto; filter: drop-shadow(4px 6px 0 rgba(0,0,0,.18)); }
  .hero h2 { font-family: var(--pixel); font-size: 16px; margin: 6px 0 6px; color: #fff; text-shadow: 3px 3px 0 #000; }
  .hero .sci { font-size: 16px; color: #2c4a1e; font-style: italic; }
  .statline { text-align: center; margin: 12px 0; }
  .days2 { font-size: 17px; color: var(--dim); margin-top: 8px; }
  .card2 { padding: 12px 14px; margin: 14px 0; }
  .card2 .row { display: flex; justify-content: space-between; align-items: center; padding: 7px 2px; font-size: 17px; }
  .card2 .row + .row { border-top: 2px solid var(--edge-l); }
  .card2 .k { color: var(--dim); } .card2 .v { color: #fff; }
  .checks { padding: 12px; margin: 12px 0; }
  .checks div { font-family: var(--pixel); font-size: 9px; color: var(--feliz); padding: 5px 0; line-height: 1.5; }
  .checks.fail div.ok { color: var(--feliz); } .checks.fail div.bad { color: var(--sed); }
  .lockmsg { text-align: center; font-size: 16px; color: #2c4a1e; margin: 9px 4px 0; }
  /* box de validacion gamificado */
  .magic { padding: 13px 14px; margin: 10px 0; border-color: var(--feliz); box-shadow: inset 3px 3px 0 rgba(70,195,106,.25), inset -3px -3px 0 #14101f; }
  .magic.fail { border-color: var(--sed); box-shadow: inset 3px 3px 0 rgba(229,72,77,.22), inset -3px -3px 0 #14101f; }
  .magic .mh { font-family: var(--pixel); font-size: 9px; color: var(--feliz); text-shadow: 2px 2px 0 #14401f; text-align: center; margin-bottom: 10px; line-height: 1.5; }
  .magic.fail .mh { color: var(--sed); text-shadow: 2px 2px 0 #400f10; }
  .magic .mr { display: flex; gap: 11px; align-items: center; font-size: 16px; color: var(--ink); padding: 4px 0; }
  .magic .mr .e { font-size: 21px; width: 28px; text-align: center; flex: none; }
  .magic .mr.no { color: var(--dim); }
  /* boton de accion protagonico */
  .btn.act { font-size: 14px; padding: 20px 14px; box-shadow: inset 3px 3px 0 #7ee29a, inset -3px -3px 0 #2b9350, 0 7px 0 #1c6437; animation: actpulse 1.3s steps(2) infinite; }
  .btn.act:active { transform: translateY(4px); box-shadow: inset 3px 3px 0 #7ee29a, inset -3px -3px 0 #2b9350, 0 3px 0 #1c6437; animation: none; }
  @keyframes actpulse { 0%,100% { filter: brightness(1); } 50% { filter: brightness(1.14); } }

  /* scan */
  #scan { padding: 0; }
  .cam { position: relative; min-height: 82vh; background: #0c0a14; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
  #reader { width: 100%; max-width: 320px; border: 4px solid var(--feliz); box-shadow: 0 0 0 4px var(--edge-d); }
  .camtitle { font-family: var(--pixel); font-size: 11px; color: var(--feliz); margin-bottom: 16px; text-align: center; text-shadow: 2px 2px 0 #0d3d1f; }
  .camtext { color: var(--dim); font-size: 17px; text-align: center; margin-top: 16px; max-width: 300px; }
  .camrow { display: flex; gap: 8px; margin-top: 18px; }

  /* watering overlay */
  .wtr { position: fixed; inset: 0; z-index: 60; display: none; align-items: center; justify-content: center; padding: 22px;
    background: linear-gradient(180deg, #1a2740, #0e1826); }
  .wtr.on { display: flex; }
  .wtr-box { text-align: center; max-width: 360px; width: 100%; }
  .wtr-tree { width: 150px; height: 150px; margin: 0 auto 8px; }
  .wtr-title { font-family: var(--pixel); font-size: 14px; color: var(--water); text-shadow: 2px 2px 0 #0a2c4a; }
  .drops { height: 20px; margin: 8px 0 14px; font-size: 18px; letter-spacing: 6px; color: var(--water); }
  .wtr-bar { height: 20px; background: #0c1524; border: 3px solid #000; padding: 2px; }
  .wtr-bar > i { display: block; height: 100%; width: 0; background: repeating-linear-gradient(90deg, var(--water) 0 8px, #2b86cc 8px 10px); }
  .dialog { margin-top: 18px; padding: 14px; background: var(--panel); border: 3px solid #000; box-shadow: inset 3px 3px 0 var(--edge-l), inset -3px -3px 0 #14101f; }
  .dialog .who { font-family: var(--pixel); font-size: 8px; color: var(--feliz); margin-bottom: 8px; }
  .dialog .tip { font-size: 19px; min-height: 48px; color: var(--ink); }
  .wtr-note { font-size: 15px; color: var(--dim); margin-top: 14px; }

  /* modal */
  .scrim { position: fixed; inset: 0; background: rgba(8,6,16,.78); display: none; align-items: center; justify-content: center; padding: 24px; z-index: 80; }
  .scrim.on { display: flex; }
  .modal { max-width: 360px; width: 100%; padding: 24px 20px; text-align: center; }
  .modal .medal { font-size: 56px; line-height: 1; animation: pixpop .5s steps(4); }
  @keyframes pixpop { from { transform: scale(.2); } to { transform: scale(1); } }
  .modal h3 { font-family: var(--pixel); font-size: 10px; color: var(--gold); margin: 14px 0 8px; text-shadow: 2px 2px 0 #6b4e08; }
  .modal .name { font-family: var(--pixel); font-size: 15px; color: #fff; margin: 0 0 12px; text-shadow: 2px 2px 0 #000; }
  .modal p { font-size: 19px; color: var(--ink); margin: 0 0 10px; line-height: 1.3; }
  .modal .pin { font-family: var(--pixel); font-size: 8px; color: var(--gold); border: 2px dashed var(--gold); padding: 8px; margin: 10px 0 16px; }
  .modal .close { width: 100%; }
  .modal .dots { display: flex; gap: 8px; justify-content: center; margin: 4px 0 14px; }
  .modal .dots i { width: 9px; height: 9px; background: #4a4066; display: inline-block; }
  .modal .dots i.on { background: var(--gold); box-shadow: inset 2px 2px 0 #ffe08a; }
  .wsteps { display: flex; flex-direction: column; gap: 12px; text-align: left; margin: 6px 2px 18px; }
  .wstep { display: flex; align-items: center; gap: 13px; }
  .wstep .em { font-size: 30px; width: 42px; height: 42px; flex: none; display: flex; align-items: center; justify-content: center; background: var(--panel2); border: 3px solid var(--edge-d); box-shadow: inset 2px 2px 0 var(--edge-l); }
  .wstep .tx { font-size: 18px; color: var(--dim); line-height: 1.25; }
  .wstep .tx b { color: var(--ink); }

  .petal { position: fixed; width: 12px; height: 12px; background: var(--violet); pointer-events: none; z-index: 65; }
  .toast { position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%) translateY(20px); z-index: 90; opacity: 0; transition: all .2s steps(3);
    font-family: var(--pixel); font-size: 9px; color: #fff; background: var(--panel2); border: 3px solid var(--edge-d); padding: 12px 16px; box-shadow: inset 2px 2px 0 var(--edge-l); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .foot { text-align: center; font-size: 14px; color: #2c4a1e; padding: 18px; }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <span class="logo">🌳 ÁRBOLES <b>GIGANTES</b></span>
    <span class="tag">MAQUETA</span>
    <button class="reset" id="reset">↺</button>
  </div>
  <div class="view on" id="home"></div>
  <div class="view" id="detail"></div>
  <div class="view" id="scan"></div>
  <div class="foot">Demo · Plaza Gigante del Oeste · datos de ejemplo</div>
</div>

<div class="wtr" id="wtr"><div class="wtr-box">
  <div class="wtr-tree" id="wtrTree"></div>
  <div class="wtr-title">GUARDANDO TU RIEGO</div>
  <div class="drops" id="drops">💧 💧 💧</div>
  <div class="wtr-bar"><i id="wtrBar"></i></div>
  <div class="dialog"><div class="who">SABÍAS QUE…</div><div class="tip" id="wtrTip"></div></div>
  <div class="wtr-note">Ya lo regaste ✓ — dale un segundo, lo estamos guardando 💧</div>
</div></div>

<div class="scrim" id="scrim"><div class="modal panel" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
(function () {
  "use strict";
  var $ = function (s) { return document.querySelector(s); };

  var LEVELS = [{ n: "APRENDIZ", min: 0 }, { n: "CUIDADOR", min: 50 }, { n: "GRAN CUIDADOR", min: 150 }, { n: "ALMA DE LA PLAZA", min: 300 }];
  function levelFor(p) { var l = LEVELS[0]; for (var i = 0; i < LEVELS.length; i++) if (p >= LEVELS[i].min) l = LEVELS[i]; return l; }
  function nextLevel(p) { for (var i = 0; i < LEVELS.length; i++) if (p < LEVELS[i].min) return LEVELS[i]; return null; }

  var SEED = [{ id: 1, days: 5 }, { id: 2, days: 4 }, { id: 3, days: 6 }, { id: 4, days: 1 }, { id: 5, days: 3 }, { id: 6, days: 2 }, { id: 7, days: 5 }, { id: 8, days: 0 }, { id: 9, days: 3 }, { id: 10, days: 2 },
    { id: 99, days: 4, far: true } /* ÁRBOL DE PRUEBA GPS (lejos) — borrar esta línea después del sábado */];
  var state, trees, wateredToday, welcomed;
  function reset() { state = { pts: 0, watered: 0, rescates: 0, badges: [] }; wateredToday = 0; welcomed = false; trees = SEED.map(function (t) { return { id: t.id, days: t.days, far: t.far }; }); show("home"); renderHome(); }

  function nameOf(t) { return t.far ? "PRUEBA GPS (LEJOS)" : "JACARANDÁ #" + t.id; }
  function stateOf(days) {
    if (days <= 1) return { label: "FELIZ", cls: "fel", health: 1, urg: 0 };
    if (days <= 2) return { label: "BIEN", cls: "ok", health: .68, urg: 1 };
    if (days <= 4) return { label: "SEDIENTO", cls: "sed", health: .42, urg: 2 };
    return { label: "MUY SEDIENTO", cls: "sed", health: .16, urg: 3 };
  }

  // ---- árbol voxel isométrico ----
  function lerpHex(a, b, t) {
    function v(h) { return [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)]; }
    var A = v(a), B = v(b), r = [];
    for (var i = 0; i < 3; i++) r.push(Math.round(A[i] + (B[i] - A[i]) * t));
    return "rgb(" + r[0] + "," + r[1] + "," + r[2] + ")";
  }
  function shade(col, f) {
    var m = col.match(/\d+/g); if (!m) return col;
    return "rgb(" + Math.round(m[0] * f) + "," + Math.round(m[1] * f) + "," + Math.round(m[2] * f) + ")";
  }
  function hx(h) { return "rgb(" + parseInt(h.slice(1, 3), 16) + "," + parseInt(h.slice(3, 5), 16) + "," + parseInt(h.slice(5, 7), 16) + ")"; }
  function isoTree(h, px) {
    var S = 12, W = S, H = S / 2, V = S, ox = 50, oy = 58;
    var grass = hx("#6BBE4A"), dirt = hx("#7A4F2A"), trunk = hx("#6E4326"), violet = hx("#7C5CD0");
    var leaf = lerpHex("#B5772E", "#3FA34D", h);
    var B = [];
    B.push({ x: 0, y: 0, z: 0, top: grass, side: dirt });
    B.push({ x: 0, y: 0, z: 1, top: trunk });
    B.push({ x: 0, y: 0, z: 2, top: trunk });
    var L = [[0, 0, 3], [1, 0, 3], [-1, 0, 3], [0, 1, 3], [0, -1, 3]];
    if (h > 0.5) L.push([1, 1, 3], [-1, -1, 3], [1, -1, 3], [-1, 1, 3]);
    if (h > 0.6) L.push([0, 0, 4]);
    L.forEach(function (c) { B.push({ x: c[0], y: c[1], z: c[2], top: leaf }); });
    if (h > 0.82) [[0, 0, 5], [1, 0, 4], [-1, 0, 4]].forEach(function (c) { B.push({ x: c[0], y: c[1], z: c[2], top: violet }); });
    B.sort(function (a, b) { return (a.x + a.y) - (b.x + b.y) || a.z - b.z; });
    var out = "";
    B.forEach(function (bk) {
      var cx = ox + (bk.x - bk.y) * W, cy = oy + (bk.x + bk.y) * H - bk.z * V;
      var side = bk.side || bk.top;
      out += '<path d="M' + cx + ' ' + (cy - H) + ' L' + (cx + W) + ' ' + cy + ' L' + cx + ' ' + (cy + H) + ' L' + (cx - W) + ' ' + cy + ' Z" fill="' + bk.top + '"/>' +
        '<path d="M' + (cx - W) + ' ' + cy + ' L' + cx + ' ' + (cy + H) + ' L' + cx + ' ' + (cy + H + V) + ' L' + (cx - W) + ' ' + (cy + V) + ' Z" fill="' + shade(side, .72) + '"/>' +
        '<path d="M' + (cx + W) + ' ' + cy + ' L' + cx + ' ' + (cy + H) + ' L' + cx + ' ' + (cy + H + V) + ' L' + (cx + W) + ' ' + (cy + V) + ' Z" fill="' + shade(side, .52) + '"/>';
    });
    return '<svg viewBox="0 0 100 100" width="' + px + '" height="' + px + '" xmlns="http://www.w3.org/2000/svg">' + out + '</svg>';
  }

  function renderHome() {
    var lv = levelFor(state.pts), nx = nextLevel(state.pts);
    var pct = nx ? Math.round((state.pts - lv.min) / (nx.min - lv.min) * 100) : 100;
    var badges = state.badges.length ? state.badges.map(function (b) { return '<span class="badge">' + b.icon + ' ' + b.name + '</span>'; }).join("") : '<span class="badge empty">SIN LOGROS — ESCANEÁ TU 1ER ÁRBOL</span>';
    var me = '<div class="me panel"><div class="lvl">NIVEL: ' + lv.n + '</div><div class="pts">' + state.pts + ' <small>PTS</small></div>' +
      '<div class="xp"><i style="width:' + pct + '%"></i></div>' +
      (nx ? '<div class="next">Faltan ' + (nx.min - state.pts) + ' para ' + nx.n + '</div>' : '<div class="next">¡NIVEL MÁXIMO!</div>') +
      '<div class="badges">' + badges + '</div></div>';

    var sorted = trees.slice().sort(function (a, b) { return stateOf(b.days).urg - stateOf(a.days).urg || a.id - b.id; });
    var thirsty = sorted.filter(function (t) { return stateOf(t.days).urg >= 2; });
    var rest = sorted.filter(function (t) { return stateOf(t.days).urg < 2; });
    var stat = '<div class="stat"><div class="box panel"><div class="num sed">' + thirsty.length + '</div><div class="lab">CON SED</div></div>' +
      '<div class="box panel"><div class="num fel">' + wateredToday + '</div><div class="lab">REGADOS HOY</div></div></div>' +
      '<button class="btn wide" id="scanBtn">📷 ESCANEAR QR</button>' +
      '<div class="cta-note">Para sumar hay que estar en el árbol y escanear su QR.</div>';

    function row(t) {
      var s = stateOf(t.days);
      return '<div class="trow panel" data-id="' + t.id + '"><div class="mini">' + isoTree(s.health, 52) + '</div>' +
        '<div class="info"><div class="nm">' + nameOf(t) + '</div><div class="st"><span class="chip ' + s.cls + '">' + s.label + '</span><span class="days">' + t.days + 'd</span></div></div><span class="go">▶</span></div>';
    }
    $("#home").innerHTML = me + stat +
      '<div class="section-h">💧 NECESITAN AGUA <span class="n">(' + thirsty.length + ')</span></div>' +
      (thirsty.length ? thirsty.map(row).join("") : '<div class="empty">Ninguno urgente 🎉</div>') +
      (rest.length ? '<div class="section-h">YA ESTÁN BIEN</div>' + rest.map(row).join("") : "");
    $("#scanBtn").addEventListener("click", function () { scanFlow(null); });
    Array.prototype.forEach.call(document.querySelectorAll(".trow"), function (el) { el.addEventListener("click", function () { openTree(+el.getAttribute("data-id"), false); }); });
  }

  function mostUrgentUnwatered() {
    var s = trees.slice().filter(function (t) { return t.days > 1 && !t.far; }).sort(function (a, b) { return stateOf(b.days).urg - stateOf(a.days).urg || a.id - b.id; });
    return (s[0] || trees[0]).id;
  }

  // ---- escaneo real ----
  var qrScanner = null;
  function stopScanner(cb) { if (qrScanner) { var s = qrScanner; qrScanner = null; s.stop().then(function () { try { s.clear(); } catch (e) {} if (cb) cb(); }).catch(function () { if (cb) cb(); }); } else if (cb) cb(); }
  function extractId(text) { try { var u = new URL(text); var t = parseInt(u.searchParams.get("t"), 10); if (isFinite(t)) return t; } catch (e) {} var n = parseInt(text, 10); return isFinite(n) ? n : null; }
  function scanFlow(targetId) {
    var fallbackId = targetId || mostUrgentUnwatered();
    $("#scan").innerHTML = '<div class="cam"><div class="camtitle">▚ ESCANEÁ EL QR ▚</div><div id="reader"></div>' +
      '<div class="camtext">Apuntá al QR de la chapita. La app lee el código y confirma que estás cerca.</div>' +
      '<div class="camrow"><button class="btn ghost sm" id="camx">✕ SALIR</button><button class="btn ghost sm" id="camskip">SIN QR: SIMULAR</button></div></div>';
    show("scan");
    $("#camx").addEventListener("click", function () { stopScanner(function () { show("home"); renderHome(); }); });
    $("#camskip").addEventListener("click", function () { stopScanner(function () { openTree(fallbackId, true); }); });
    if (typeof Html5Qrcode === "undefined") { toast("NO CARGÓ EL LECTOR"); return; }
    qrScanner = new Html5Qrcode("reader", { verbose: false });
    qrScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 210, height: 210 } },
      function (text) { var id = extractId(text); stopScanner(function () { if (id && trees.some(function (x) { return x.id === id; })) openTree(id, true); else { toast("QR NO RECONOCIDO"); show("home"); renderHome(); } }); },
      function () {}).catch(function () { toast("NO PUDE ABRIR LA CÁMARA"); });
  }

  var curId = null;
  function openTree(id, scanned) { curId = id; renderDetail(scanned); show("detail"); window.scrollTo(0, 0); if (scanned && !welcomed) { welcomed = true; welcomeModal(); } }
  function renderDetail(scanned) {
    var t = trees.filter(function (x) { return x.id === curId; })[0], s = stateOf(t.days);
    var bonus = s.urg >= 3 ? 25 : s.urg === 2 ? 15 : s.urg === 1 ? 5 : 0;
    var action;
    if (scanned && t.far) action = '<div class="magic panel fail">' +
        '<div class="mh">🔒 ESTE RIEGO NO CONTARÍA</div>' +
        '<div class="mr"><span class="e">🌳</span>Es este jacarandá real ✓</div>' +
        '<div class="mr no"><span class="e">📍</span>Pero estás lejos (~3,2 km) ✗</div></div>' +
        '<button class="btn red wide" disabled>💧 NO PODÉS DESDE ACÁ</button>' +
        '<div class="lockmsg">Para que cuente tenés que estar al pie del árbol — así nadie suma puntos de mentira. Acercate y escaneá su chapita.</div>';
    else if (s.urg === 0 && scanned) action = '<div class="magic panel">' +
        '<div class="mh">🌳 ESTE JACARANDÁ ESTÁ FELIZ</div>' +
        '<div class="mr"><span class="e">💧</span>Ya tomó suficiente agua</div></div>' +
        '<button class="btn ghost wide" disabled>NO NECESITA AGUA AHORA</button>' +
        '<div class="lockmsg">Regarlo de más no suma. Buscá uno sediento 👉</div>';
    else if (scanned) action = '<div class="magic panel">' +
        '<div class="mh">✨ ¡ESTE RIEGO CUENTA!</div>' +
        '<div class="mr"><span class="e">🌳</span>Es este jacarandá real, no otro</div>' +
        '<div class="mr"><span class="e">📍</span>Y estás parado a su lado</div></div>' +
        '<button class="btn green wide act" id="water">💧 YA LO REGUÉ &nbsp;+' + (10 + bonus) + '</button>' +
        '<div class="lockmsg">Tocá recién cuando terminaste de regarlo</div>';
    else action = '<div class="magic panel fail">' +
        '<div class="mh">🔒 PARA REGAR, ESCANEÁ SU CHAPITA</div>' +
        '<div class="mr no"><span class="e">📷</span>El árbol te reconoce de cerca, no a distancia</div></div>' +
        '<button class="btn ghost wide" id="scanHere">📷 ESCANEAR CHAPITA</button>' +
        '<div class="lockmsg">Desde el sillón no se riega. Andá al árbol y escaneá.</div>';
    $("#detail").innerHTML = '<button class="back" id="back">◀ VOLVER</button>' +
      '<div class="hero"><div class="big">' + isoTree(s.health, 150) + '</div><h2>' + nameOf(t) + '</h2><div class="sci">Jacaranda mimosifolia</div></div>' +
      '<div class="statline"><span class="chip ' + s.cls + '" style="font-size:9px;padding:6px 10px">' + s.label + '</span><div class="days2">Último riego: hace ' + t.days + ' día' + (t.days === 1 ? "" : "s") + '</div></div>' +
      action +
      '<div class="card2 panel"><div class="row"><span class="k">Leyenda del árbol</span><span class="v" style="color:var(--dim)">— pronto 🚩</span></div><div class="row"><span class="k">Sector</span><span class="v">Galería central</span></div></div>';
    $("#back").addEventListener("click", function () { show("home"); renderHome(); });
    if ($("#water")) $("#water").addEventListener("click", startWatering);
    if ($("#scanHere")) $("#scanHere").addEventListener("click", function () { scanFlow(t.id); });
  }

  var TIPS = ["Los jacarandás jóvenes toman agua cada ~2 días en verano.", "Regá en la base: así el agua llega a la raíz.", "Con un balde alcanza. De más no ayuda a un arbolito.", "En primavera florece violeta — por eso La Plata es su ciudad.", "Mejor temprano o al atardecer, no al sol del mediodía."];
  function startWatering() {
    var DUR = 5000, bar = $("#wtrBar"), tip = $("#wtrTip"), i = Math.floor(Math.random() * TIPS.length);
    $("#wtrTree").innerHTML = isoTree(.16, 150);
    tip.textContent = TIPS[i]; $("#wtr").className = "wtr on"; bar.style.transition = "none"; bar.style.width = "0%";
    var grow = 0, gi = setInterval(function () { grow += .1; if (grow > 1) grow = 1; $("#wtrTree").innerHTML = isoTree(.16 + .84 * grow, 150); }, 500);
    var ti = setInterval(function () { i = (i + 1) % TIPS.length; tip.textContent = TIPS[i]; }, 1700);
    setTimeout(function () { bar.style.transition = "width " + DUR + "ms steps(20)"; bar.style.width = "100%"; }, 40);
    setTimeout(function () { clearInterval(ti); clearInterval(gi); $("#wtr").className = "wtr"; applyWater(); }, DUR + 80);
  }
  function applyWater() {
    var t = trees.filter(function (x) { return x.id === curId; })[0], s = stateOf(t.days);
    var bonus = s.urg >= 3 ? 25 : s.urg === 2 ? 15 : 5, gained = 10 + bonus;
    var wasFirst = state.watered === 0, wasRescate = s.urg >= 3;
    state.watered++; wateredToday++; if (wasRescate) state.rescates++;
    var before = state.pts; state.pts += gained; t.days = 0;
    petals(); openTree(curId, true); toast("+" + gained + " PTS" + (wasRescate ? " · ¡RESCATE!" : ""));
    var lvBefore = levelFor(before).n, lvAfter = levelFor(state.pts).n;
    setTimeout(function () {
      if (wasFirst && !state.badges.some(function (b) { return b.name === "PRIMER RIEGO"; })) { state.badges.push({ icon: "💧", name: "PRIMER RIEGO" }); modal("💧", "¡LOGRO NUEVO!", "PRIMER RIEGO", "Regaste tu primer árbol. Chiquito el gesto, enorme para ese jacarandá. ¡Bienvenido, Cuidador!", true); }
      else if (lvAfter !== lvBefore) modal("⭐", "¡SUBISTE DE NIVEL!", lvAfter, levelCopy(lvAfter), false);
      else if (wasRescate) modal("🚑", "LOGRO EN CAMINO", "RESCATISTA " + state.rescates + "/5", "Salvaste un árbol al borde de secarse. Cinco rescates y te ganás el pin de Rescatista.", false);
    }, 720);
  }
  function levelCopy(n) { return n === "CUIDADOR" ? "Ya no sos visita. Sos Cuidador de la plaza." : n === "GRAN CUIDADOR" ? "La plaza empieza a ser tuya. Gran Cuidador." : n === "ALMA DE LA PLAZA" ? "Sos parte del lugar. Alma de la Plaza." : "¡Seguí así!"; }

  function welcomeModal() { welcomeStep(1); $("#scrim").className = "scrim on"; }
  function welcomeStep(n) {
    if (n === 1) {
      $("#modal").innerHTML = '<div class="medal">🌳</div><h3>BIENVENIDO A</h3><div class="name">ÁRBOLES GIGANTES</div>' +
        '<p>Escaneaste un jacarandá real de la plaza. Es un juego del barrio para cuidar entre todos los árboles jóvenes: los regás y crecen. 🌱</p>' +
        '<div class="dots"><i class="on"></i><i></i><i></i></div>' +
        '<button class="btn gold close" id="wnext">SIGUIENTE ▶</button>';
      $("#wnext").addEventListener("click", function () { welcomeStep(2); });
    } else if (n === 2) {
      $("#modal").innerHTML = '<div class="medal">🏅</div><h3>REGÁS Y GANÁS</h3><div class="name">PREMIOS DE VERDAD</div>' +
        '<div class="wsteps">' +
        '<div class="wstep"><span class="em">📌</span><span class="tx">El <b>pin</b> que ganás en el juego <b>te lo damos en la vida real</b></span></div>' +
        '<div class="wstep"><span class="em">🤝</span><span class="tx"><b>Logros</b>: sé el tutor del árbol que más cuidás</span></div>' +
        '</div>' +
        '<div class="dots"><i></i><i class="on"></i><i></i></div>' +
        '<button class="btn gold close" id="wnext2">SIGUIENTE ▶</button>';
      $("#wnext2").addEventListener("click", function () { welcomeStep(3); });
    } else {
      $("#modal").innerHTML = '<div class="medal">💧</div><h3>TU MISIÓN AHORA</h3><div class="name">REGÁ ESTE ÁRBOL</div>' +
        '<div class="wsteps">' +
        '<div class="wstep"><span class="em">🪣</span><span class="tx"><b>Llená el balde</b> en el bebedero de la plaza</span></div>' +
        '<div class="wstep"><span class="em">🌳</span><span class="tx"><b>Regá</b> este arbolito con el agua del balde</span></div>' +
        '<div class="wstep"><span class="em">⭐</span><span class="tx">Cuando terminaste, marcá en la app que <b>ya lo regaste</b> y sumás <b>tus primeros puntos</b></span></div>' +
        '</div>' +
        '<div class="dots"><i></i><i></i><i class="on"></i></div>' +
        '<button class="btn gold close" id="wclose">¡EMPEZAR! 🌱</button>';
      $("#wclose").addEventListener("click", function () { $("#scrim").className = "scrim"; });
    }
  }
  function modal(medal, kicker, name, copy, isPin) {
    $("#modal").innerHTML = '<div class="medal">' + medal + '</div><h3>' + kicker + '</h3><div class="name">' + name + '</div><p>' + copy + '</p>' + (isPin ? '<div class="pin">📌 SE ENTREGA COMO PIN REAL</div>' : "") + '<button class="btn gold close" id="mclose">GENIAL</button>';
    $("#scrim").className = "scrim on"; $("#mclose").addEventListener("click", function () { $("#scrim").className = "scrim"; });
  }
  function petals() { for (var i = 0; i < 12; i++) { var p = document.createElement("div"); p.className = "petal"; p.style.left = (28 + Math.random() * 44) + "%"; p.style.top = "36%"; document.body.appendChild(p); var dx = (Math.random() * 2 - 1) * 130, dy = 130 + Math.random() * 130; p.animate([{ transform: "translate(0,0)", opacity: 1 }, { transform: "translate(" + dx + "px," + dy + "px)", opacity: 0 }], { duration: 900 + Math.random() * 500, easing: "steps(8)" }); (function (el) { setTimeout(function () { el.remove(); }, 1500); })(p); } }
  var tt; function toast(m) { var t = $("#toast"); t.textContent = m; t.className = "toast show"; clearTimeout(tt); tt = setTimeout(function () { t.className = "toast"; }, 1900); }
  function show(v) { Array.prototype.forEach.call(document.querySelectorAll(".view"), function (el) { el.className = "view" + (el.id === v ? " on" : ""); }); }

  $("#reset").addEventListener("click", reset);
  reset();
  var tp = parseInt(new URLSearchParams(location.search).get("t"), 10);
  if (isFinite(tp) && trees.some(function (x) { return x.id === tp; })) openTree(tp, true);
})();
</script>
</body>
</html>
