<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Árboles Gigantes — Chapitas QR jacarandás</title>
<style>
  :root { --violet: #6B4FBF; --ink: #1E1B26; --muted: #6E697A; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif; color: var(--ink); background: #EEE; }
  .bar { max-width: 820px; margin: 0 auto; padding: 16px; }
  .bar h1 { font-size: 18px; margin: 0 0 4px; }
  .bar p { font-size: 13px; color: #555; margin: 0; }
  .bar button { margin-top: 10px; padding: 10px 16px; font: inherit; font-weight: 700; color: #fff; background: var(--violet); border: none; border-radius: 10px; cursor: pointer; }
  .sheet { max-width: 820px; margin: 0 auto; padding: 0 16px 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .chapita { background: #fff; border: 1.5px dashed #C9C3D6; border-radius: 16px; padding: 16px 14px; text-align: center; break-inside: avoid; }
  .chapita .brand { font-weight: 800; font-size: 13px; letter-spacing: -.01em; color: var(--violet); }
  .chapita img { width: 62%; max-width: 210px; height: auto; display: block; margin: 8px auto 6px; }
  .chapita .nm { font-weight: 800; font-size: 20px; letter-spacing: -.02em; margin: 2px 0 0; }
  .chapita .hook { font-size: 14px; color: var(--ink); margin: 2px 0 4px; font-weight: 600; }
  .chapita .sub { font-size: 11px; color: var(--muted); }
  @media print {
    body { background: #fff; }
    .bar { display: none; }
    .sheet { padding: 0; gap: 8px; }
    .chapita { border-color: #bbb; }
    @page { margin: 12mm; }
  }
</style>
</head>
<body>
  <div class="bar">
    <h1>Chapitas QR — Galería de jacarandás</h1>
    <p>Imprimí, recortá por la línea punteada y colgá una en cada árbol. Cada QR abre ese jacarandá en la app.</p>
    <button onclick="window.print()">Imprimir</button>
  </div>
  <div class="sheet" id="sheet"></div>
  <script>
    var sheet = document.getElementById("sheet");
    for (var i = 1; i <= 10; i++) {
      var nn = String(i).padStart(2, "0");
      var d = document.createElement("div");
      d.className = "chapita";
      d.innerHTML =
        '<div class="brand">🌳 Árboles Gigantes</div>' +
        '<img src="jacarandas/jacaranda-' + nn + '.png" alt="QR jacarandá ' + i + '">' +
        '<div class="nm">Jacarandá #' + i + '</div>' +
        '<div class="hook">Regame y sumá puntos 💧</div>' +
        '<div class="sub">Escaneá con la cámara del celu</div>';
      sheet.appendChild(d);
    }
  </script>
</body>
</html>
